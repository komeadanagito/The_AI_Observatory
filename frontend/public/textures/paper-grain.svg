<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <!-- 基础噪点纹理 -->
    <filter id="paper-noise">
      <feTurbulence 
        type="fractalNoise" 
        baseFrequency="0.8" 
        numOctaves="4" 
        seed="42"
        stitchTiles="stitch"
      />
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
    </filter>
    
    <!-- 纤维纹理 -->
    <filter id="paper-fibers">
      <feTurbulence 
        type="turbulence" 
        baseFrequency="0.02 0.8" 
        numOctaves="2" 
        seed="15"
      />
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- 噪点层 -->
  <rect width="100%" height="100%" filter="url(#paper-noise)" fill="#b8956e"/>
  
  <!-- 纤维层 -->
  <rect width="100%" height="100%" filter="url(#paper-fibers)" fill="#8a7355"/>
</svg>
