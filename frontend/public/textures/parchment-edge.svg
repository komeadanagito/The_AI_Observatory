<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <!-- 不规则边缘 -->
    <filter id="worn-edge">
      <feTurbulence 
        type="fractalNoise" 
        baseFrequency="0.05" 
        numOctaves="3" 
        seed="7"
      />
      <feDisplacementMap 
        in="SourceGraphic" 
        scale="8"
      />
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    
    <!-- 渐变遮罩 - 边缘透明 -->
    <linearGradient id="edge-fade-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1d24" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#1a1d24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1d24" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="edge-fade-right" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1a1d24" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#1a1d24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1d24" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="edge-fade-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1d24" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#1a1d24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1d24" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="edge-fade-bottom" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1a1d24" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#1a1d24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1d24" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- 四边渐隐效果 -->
  <rect x="0" y="0" width="15" height="100" fill="url(#edge-fade-left)" filter="url(#worn-edge)"/>
  <rect x="85" y="0" width="15" height="100" fill="url(#edge-fade-right)" filter="url(#worn-edge)"/>
  <rect x="0" y="0" width="100" height="15" fill="url(#edge-fade-top)" filter="url(#worn-edge)"/>
  <rect x="0" y="85" width="100" height="15" fill="url(#edge-fade-bottom)" filter="url(#worn-edge)"/>
</svg>
