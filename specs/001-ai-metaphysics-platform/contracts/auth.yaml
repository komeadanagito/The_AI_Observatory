# 认证模块 API 契约
# 模块: auth
# 版本: 1.0.0

openapi: 3.1.0
info:
  title: 认证 API
  description: 用户注册、登录、密码管理
  version: 1.0.0

paths:
  /api/auth/register:
    post:
      summary: 用户注册
      description: 创建新账户，无需邮箱验证，注册后立即可用
      operationId: registerUser
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: 请求无效 (邮箱格式错误/密码不符合要求)
        '409':
          description: 邮箱已被注册

  /api/auth/login:
    post:
      summary: 用户登录
      description: 邮箱+密码登录，失败时记录日志但不限制重试
      operationId: loginUser
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 邮箱或密码错误

  /api/auth/refresh:
    post:
      summary: 刷新令牌
      description: 使用 Refresh Token 获取新的 Access Token
      operationId: refreshToken
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh Token 无效或已过期

  /api/auth/forgot-password:
    post:
      summary: 忘记密码
      description: 发送密码重置链接到邮箱
      operationId: forgotPassword
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: 重置链接已发送 (即使邮箱不存在也返回成功，防止枚举)

  /api/auth/reset-password:
    post:
      summary: 重置密码
      description: 使用重置令牌设置新密码
      operationId: resetPassword
      tags: [认证]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: 密码重置成功
        '400':
          description: 令牌无效或已过期

  /api/auth/logout:
    post:
      summary: 登出
      description: 使当前会话失效
      operationId: logoutUser
      tags: [认证]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: 用户邮箱
        password:
          type: string
          minLength: 8
          description: 密码 (至少8位，包含字母和数字)

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        remember_me:
          type: boolean
          default: false
          description: 是否延长会话有效期

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT Access Token (15分钟有效)
        refresh_token:
          type: string
          description: Refresh Token (7天有效)
        token_type:
          type: string
          default: bearer
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        language:
          type: string
          enum: [zh, en]
        created_at:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
