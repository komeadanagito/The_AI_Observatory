# 中式算命模块 API 契约
# 模块: chinese_astrology
# 版本: 1.0.0

openapi: 3.1.0
info:
  title: 中式算命 API
  description: 八字排盘与紫微斗数 AI 解读服务
  version: 1.0.0

paths:
  /api/chinese-astrology/bazi/calculate:
    post:
      summary: 八字排盘
      description: 根据出生信息计算八字四柱
      operationId: calculateBazi
      tags: [中式算命]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BirthInfoRequest'
      responses:
        '200':
          description: 计算成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaziChart'
        '400':
          description: 出生信息不完整或无效

  /api/chinese-astrology/bazi/interpret:
    post:
      summary: 八字 AI 解读
      description: 对八字命盘进行 AI 解读 (流式响应)
      operationId: interpretBazi
      tags: [中式算命]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chart_id]
              properties:
                chart_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: 解读成功 (SSE 流式响应)
          content:
            text/event-stream:
              schema:
                type: string

  /api/chinese-astrology/ziwei/calculate:
    post:
      summary: 紫微斗数排盘
      description: 根据出生信息生成紫微命盘
      operationId: calculateZiwei
      tags: [中式算命]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BirthInfoRequest'
      responses:
        '200':
          description: 计算成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZiweiChart'

  /api/chinese-astrology/ziwei/interpret:
    post:
      summary: 紫微斗数 AI 解读
      description: 对紫微命盘进行 AI 解读 (流式响应)
      operationId: interpretZiwei
      tags: [中式算命]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chart_id]
              properties:
                chart_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: 解读成功 (SSE 流式响应)
          content:
            text/event-stream:
              schema:
                type: string

components:
  schemas:
    BirthInfoRequest:
      type: object
      required: [birth_year, birth_month, birth_day, birth_hour, gender]
      properties:
        birth_year:
          type: integer
          minimum: 1900
          maximum: 2100
        birth_month:
          type: integer
          minimum: 1
          maximum: 12
        birth_day:
          type: integer
          minimum: 1
          maximum: 31
        birth_hour:
          type: integer
          minimum: 0
          maximum: 23
          description: 出生时辰 (0-23点)
        gender:
          type: string
          enum: [male, female]
        birth_place:
          type: string
          description: 出生地 (可选，用于真太阳时校正)
        calendar_type:
          type: string
          enum: [solar, lunar]
          default: solar
          description: 日历类型 (公历/农历)

    BaziChart:
      type: object
      properties:
        id:
          type: string
          format: uuid
        four_pillars:
          type: object
          properties:
            year:
              $ref: '#/components/schemas/Pillar'
            month:
              $ref: '#/components/schemas/Pillar'
            day:
              $ref: '#/components/schemas/Pillar'
            hour:
              $ref: '#/components/schemas/Pillar'
        five_elements:
          type: object
          properties:
            wood:
              type: integer
            fire:
              type: integer
            earth:
              type: integer
            metal:
              type: integer
            water:
              type: integer
        day_master:
          type: string
          description: 日主 (日柱天干)
        day_master_element:
          type: string
          enum: [wood, fire, earth, metal, water]

    Pillar:
      type: object
      properties:
        heavenly_stem:
          type: string
          description: 天干 (甲乙丙丁...)
        heavenly_stem_element:
          type: string
        earthly_branch:
          type: string
          description: 地支 (子丑寅卯...)
        earthly_branch_element:
          type: string
        hidden_stems:
          type: array
          items:
            type: string
          description: 藏干

    ZiweiChart:
      type: object
      properties:
        id:
          type: string
          format: uuid
        palaces:
          type: array
          items:
            $ref: '#/components/schemas/Palace'
          description: 十二宫位
        main_star:
          type: string
          description: 命宫主星

    Palace:
      type: object
      properties:
        index:
          type: integer
          minimum: 1
          maximum: 12
        name:
          type: string
          description: 宫位名称 (命宫、兄弟宫...)
        stars:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              category:
                type: string
                enum: [主星, 辅星, 煞星, 四化]

    InterpretationResult:
      type: object
      properties:
        interpretation:
          type: string
        summary:
          type: string
        keywords:
          type: array
          items:
            type: string
        disclaimer:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
