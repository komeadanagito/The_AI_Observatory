# 用户管理模块 API 契约
# 模块: user
# 版本: 1.0.0

openapi: 3.1.0
info:
  title: 用户管理 API
  description: 用户资料、历史记录、数据隐私管理
  version: 1.0.0

paths:
  /api/user/profile:
    get:
      summary: 获取用户资料
      description: 获取当前登录用户的个人资料
      operationId: getProfile
      tags: [用户管理]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

    patch:
      summary: 更新用户资料
      description: 更新当前用户的个人资料
      operationId: updateProfile
      tags: [用户管理]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /api/user/history:
    get:
      summary: 获取解读历史
      description: 获取用户的所有解读记录 (分页)
      operationId: getHistory
      tags: [历史记录]
      security:
        - bearerAuth: []
      parameters:
        - name: module
          in: query
          schema:
            type: string
            enum: [tarot, bazi, ziwei, horoscope, mbti]
          description: 按模块筛选
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryListResponse'

  /api/user/history/{reading_id}:
    get:
      summary: 获取解读详情
      description: 获取单条解读记录的完整内容
      operationId: getHistoryDetail
      tags: [历史记录]
      security:
        - bearerAuth: []
      parameters:
        - name: reading_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingDetail'
        '404':
          description: 记录不存在

    delete:
      summary: 删除解读记录
      description: 删除单条解读记录
      operationId: deleteHistory
      tags: [历史记录]
      security:
        - bearerAuth: []
      parameters:
        - name: reading_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 删除成功
        '404':
          description: 记录不存在

  /api/user/history/clear:
    delete:
      summary: 清空所有历史
      description: 删除用户的所有解读记录 (需二次确认)
      operationId: clearHistory
      tags: [历史记录]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: boolean
                  description: 必须为 true 以确认删除
      responses:
        '204':
          description: 清空成功
        '400':
          description: 未确认删除

  /api/user/data:
    get:
      summary: 查看我的数据
      description: 查看用户存储的所有个人数据
      operationId: getMyData
      tags: [数据隐私]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDataSummary'

  /api/user/data/export:
    post:
      summary: 导出数据
      description: 生成用户所有数据的可下载文件
      operationId: exportData
      tags: [数据隐私]
      security:
        - bearerAuth: []
      responses:
        '202':
          description: 导出任务已创建
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [processing]

  /api/user/data/export/{task_id}:
    get:
      summary: 获取导出状态
      description: 查询数据导出任务状态
      operationId: getExportStatus
      tags: [数据隐私]
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  download_url:
                    type: string
                    description: 下载链接 (status=completed 时有效)
                  expires_at:
                    type: string
                    format: date-time

  /api/user/account:
    delete:
      summary: 删除账户
      description: 永久删除用户账户及所有数据
      operationId: deleteAccount
      tags: [数据隐私]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirm]
              properties:
                password:
                  type: string
                  description: 当前密码 (验证身份)
                confirm:
                  type: boolean
                  description: 必须为 true
      responses:
        '204':
          description: 账户已删除
        '401':
          description: 密码错误
        '400':
          description: 未确认删除

  /api/user/language:
    patch:
      summary: 切换语言
      description: 更新用户语言偏好
      operationId: updateLanguage
      tags: [用户管理]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [language]
              properties:
                language:
                  type: string
                  enum: [zh, en]
      responses:
        '200':
          description: 更新成功

components:
  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        has_birth_info:
          type: boolean
          description: 是否已填写出生信息
        gender:
          type: string
          enum: [male, female, other]
        language:
          type: string
          enum: [zh, en]
        created_at:
          type: string
          format: date-time
        reading_counts:
          type: object
          properties:
            tarot:
              type: integer
            bazi:
              type: integer
            ziwei:
              type: integer
            horoscope:
              type: integer
            mbti:
              type: integer

    UpdateProfileRequest:
      type: object
      properties:
        birth_date:
          type: string
          format: date
        birth_time:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        birth_place:
          type: string
        gender:
          type: string
          enum: [male, female, other]

    HistoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer

    HistoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reading_type:
          type: string
        summary:
          type: string
          description: 解读摘要
        created_at:
          type: string
          format: date-time

    ReadingDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reading_type:
          type: string
        input_data:
          type: object
        output_data:
          type: object
        created_at:
          type: string
          format: date-time

    UserDataSummary:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/UserProfile'
        total_readings:
          type: integer
        data_categories:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
              earliest:
                type: string
                format: date-time
              latest:
                type: string
                format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
